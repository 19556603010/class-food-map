<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级美食地图 - 同学们的私藏食堂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #FFFBF5 0%, #FFF8E7 30%, #FFF0E0 60%, #FFFAF0 100%);
            min-height: 100vh;
            padding-top: 280px;
            overflow-x: hidden;
        }

        /* 全局加载状态 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            color: #FF6B35;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #FFE0B2;
            border-top-color: #FF6B35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 导航栏样式 ========== */
        header {
            background: linear-gradient(135deg, #FF9F43 0%, #FF6B35 50%, #E65100 100%);
            color: white;
            padding: 1.2rem 1rem;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 20px rgba(255, 107, 53, 0.3);
        }

        /* 导航栏滚动收缩效果 */
        header.scrolled {
            padding: 0.6rem 1rem;
            box-shadow: 0 4px 30px rgba(255, 107, 53, 0.4);
        }

        header.scrolled .header-icon { font-size: 1.4rem; margin-bottom: 0.2rem; }
        header.scrolled h1 { font-size: 1.3rem; margin-bottom: 0.2rem; }
        header.scrolled .subtitle { display: none; }
        header.scrolled .search-box { max-width: 350px; padding: 0.4rem 1rem; }
        header.scrolled .filter-section { margin-top: 0.4rem; }

        .header-icon { font-size: 2.2rem; margin-bottom: 0.3rem; }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 0.8rem;
        }

        /* 搜索框 */
        .search-box {
            width: 100%;
            max-width: 450px;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .search-box:focus {
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
            transform: scale(1.02);
        }

        /* 分类筛选按钮 */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .filter-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 0.45rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            min-width: 70px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(255,255,255,0.98);
            color: #FF6B35;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* ========== 容器与网格布局 ========== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.2rem;
        }

        /* ========== 卡片样式 ========== */
        /* 卡片基础样式 */
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardFadeIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            aspect-ratio: 3/4; /* 确保所有卡片宽高一致 */
            display: flex;
            flex-direction: column;
        }

        /* 卡片进入动画 */
        @keyframes cardFadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            50% { opacity: 0.8; transform: translateY(-3px) scale(1.01); }
            70% { transform: translateY(2px) scale(0.99); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 卡片悬停效果 */
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 107, 53, 0.2), 0 0 0 1px rgba(255, 107, 53, 0.1);
            z-index: 10;
        }

        .card:hover .card-image-wrapper .card-image {
            transform: scale(1.12);
        }

        .card:hover .food-name {
            color: #FF6B35;
        }

        /* ========== 卡片图片区域 ========== */
        .card-image-wrapper {
            width: 100%;
            height: 170px;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, #FFE0B2 0%, #FFCC80 100%);
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
        }

        /* 图片骨架屏 - 加载时显示 */
        .card-image-skeleton {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, #FFE0B2 25%, #FFCC80 50%, #FFE0B2 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            z-index: 1;
        }

        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .card-content {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }

        .food-emoji { font-size: 1.4rem; }

        .food-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            transition: color 0.3s ease;
        }

        .card-desc {
            color: #666;
            font-size: 0.82rem;
            line-height: 1.5;
            margin-bottom: 0.7rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.5rem;
            border-top: 1px solid #eee;
            font-size: 0.72rem;
        }

        .location {
            color: #FF6B35;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .recommend {
            background: #FFF3E0;
            color: #E65100;
            padding: 0.15rem 0.4rem;
            border-radius: 8px;
            font-weight: 500;
        }

        /* ========== 弹窗样式 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            display: none;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .detail-modal {
            background: white;
            border-radius: 20px;
            max-width: 90vw;
            max-height: 90vh;
            width: 100%;
            max-width: 580px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            animation: modalSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
        }

        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.93); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            position: relative;
            height: 190px;
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.55);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.1);
        }

        .modal-content {
            padding: 1.4rem;
            overflow-y: auto;
            max-height: calc(90vh - 190px);
        }

        .modal-title-row {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            margin-bottom: 0.4rem;
        }

        .modal-emoji { font-size: 2.3rem; }
        .modal-title { font-size: 1.45rem; color: #333; }
        .modal-shop { color: #FF6B35; font-size: 0.95rem; margin-bottom: 0.9rem; }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.9rem;
        }

        .modal-tag {
            background: #FFF3E0;
            color: #E65100;
            padding: 0.25rem 0.6rem;
            border-radius: 14px;
            font-size: 0.76rem;
        }

        .modal-desc {
            color: #555;
            font-size: 0.92rem;
            line-height: 1.7;
            margin-bottom: 1.1rem;
        }

        .modal-recommend {
            background: linear-gradient(135deg, #FFF8E7 0%, #FFF0E0 100%);
            padding: 1.1rem;
            border-radius: 12px;
            margin-bottom: 1.1rem;
            border: 1px solid rgba(255, 107, 53, 0.1);
        }

        .modal-recommend-label {
            color: #FF6B35;
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }

        .modal-recommend-text {
            color: #555;
            font-style: italic;
            line-height: 1.6;
            font-size: 0.88rem;
        }

        .modal-recommend-name {
            text-align: right;
            color: #888;
            font-size: 0.78rem;
            margin-top: 0.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.9rem;
            padding-top: 0.9rem;
            border-top: 1px solid #eee;
        }

        .modal-action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.65rem 0.9rem;
            border: none;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .modal-action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .modal-action-btn:hover::before { left: 100%; }
        .modal-action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }

        .modal-like-btn {
            background: linear-gradient(135deg, #FFF3E0 0%, #FFE0B2 100%);
            color: #E65100;
        }

        .modal-collect-btn {
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
            color: #1976D2;
        }

        .modal-collect-btn.collected {
            background: linear-gradient(135deg, #FFF3E0 0%, #FFE0B2 100%);
            color: #E65100;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1.5rem 1rem;
            margin-top: 2rem;
        }

        .github-btn {
            display: inline-block;
            background: #FF6B35;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 0.8rem;
            transition: all 0.3s ease;
        }

        .github-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
        }

        .footer-text {
            opacity: 0.7;
            font-size: 0.85rem;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 768px) {
            body { padding-top: 300px; }
            h1 { font-size: 1.5rem; }
            
            .grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .card {
                aspect-ratio: auto; /* 移动端取消固定宽高比 */
            }

            .card-image-wrapper { height: 160px; }

            .detail-modal { max-height: 95vh; }
            .modal-header { height: 150px; }
            .modal-content { padding: 1.1rem; }
            .modal-title { font-size: 1.25rem; }
        }

        @media (max-width: 480px) {
            body { padding-top: 320px; }
            h1 { font-size: 1.3rem; }
            .card-content { padding: 0.9rem; }
            .modal-header { height: 130px; }
            
            .modal-actions { flex-wrap: wrap; }
            .modal-action-btn { min-width: calc(50% - 0.45rem); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-icon">📍</div>
        <h1>班级美食地图</h1>
        <p class="subtitle">同学们私藏的校园周边美食指南</p>
        <input type="text" class="search-box" id="search-input" placeholder="搜索美食、店铺或推荐人...">
        <div class="filter-section">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="小吃">🍜 小吃</button>
            <button class="filter-btn" data-category="饮品">🥤 饮品</button>
            <button class="filter-btn" data-category="快餐">🍗 快餐</button>
            <button class="filter-btn" data-category="甜品">🧁 甜品</button>
        </div>
    </header>

    <main id="home-page" class="container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <span>加载中...</span>
        </div>
        <div class="grid" id="food-grid" style="display: none;"></div>
    </main>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="detail-modal" id="detail-modal">
            <div class="modal-header">
                <img src="" alt="" class="modal-image" id="modal-image">
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-content">
                <div class="modal-title-row">
                    <span class="modal-emoji" id="modal-emoji">🍳</span>
                    <h2 class="modal-title" id="modal-title">美食名称</h2>
                </div>
                <p class="modal-shop" id="modal-shop">店铺名称</p>
                <div class="modal-tags" id="modal-tags"></div>
                <p class="modal-desc" id="modal-desc"></p>
                <div class="modal-recommend">
                    <div class="modal-recommend-label">💬 推荐人说</div>
                    <p class="modal-recommend-text" id="modal-recommend-text"></p>
                    <p class="modal-recommend-name" id="modal-recommend-name">—— 推荐人</p>
                </div>
                <div class="modal-actions">
                    <button class="modal-action-btn modal-like-btn" id="modal-like-btn">
                        <span>👍</span>
                        <span id="modal-like-count">0</span>
                    </button>
                    <button class="modal-action-btn modal-collect-btn" id="modal-collect-btn">
                        <span>⭐</span>
                        <span>收藏</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://github.com/19556603010/class-food-map" class="github-btn" target="_blank">📦 查看源码</a>
        <p class="footer-text">通过 GitHub Pages 可在线访问</p>
    </footer>

                tags: ['🔥 校门口回忆', '💰 人均8元', '⏰ 5:00-22:00', '✨ 经典小吃'],
                category: '小吃',

            },
            {
                id: 7,
                name: '粤味双皮奶',
                emoji: '🧁',
                image: './images/双皮奶.png',  // 相对路径
                location: '📍 步行街转角',
                recommender: '团支书推荐',
                shortDesc: '正宗广东风味，奶皮厚实香醇，口感细腻顺滑',
                tags: ['🥛 奶香浓郁', '💰 人均10元', '⏰ 11:00-21:00', '💕 甜蜜时光'],
                category: '甜品',
                desc: '步行街转角的双皮奶店是团支书的私藏！正宗的广东风味，奶皮厚实香醇，口感细腻顺滑得像丝绸一样。',
                recommendText: '这家双皮奶真的太治愈了！奶香味超级浓郁，口感顺滑得像在吃云朵。',
                recommendName: '团支书 周小美'
            }
        ];

        // ========== DOM元素获取 ==========
        const foodGrid = document.getElementById('food-grid');
        const searchInput = document.getElementById('search-input');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const loading = document.getElementById('loading');
        
        // 弹窗元素
        const modalOverlay = document.getElementById('modal-overlay');
        const modalClose = document.getElementById('modal-close');
        const modalImage = document.getElementById('modal-image');
        const modalEmoji = document.getElementById('modal-emoji');
        const modalTitle = document.getElementById('modal-title');
        const modalShop = document.getElementById('modal-shop');
        const modalTags = document.getElementById('modal-tags');
        const modalDesc = document.getElementById('modal-desc');
        const modalRecommendText = document.getElementById('modal-recommend-text');
        const modalRecommendName = document.getElementById('modal-recommend-name');
        const modalLikeBtn = document.getElementById('modal-like-btn');
        const modalLikeCount = document.getElementById('modal-like-count');
        const modalCollectBtn = document.getElementById('modal-collect-btn');

        // ========== 状态变量 ==========
        let currentFood = null;
        let currentCategory = 'all';  // 默认显示全部
        let currentSearch = '';
        
        // 强制清除可能干扰的localStorage数据
        localStorage.removeItem('currentCategory');
        localStorage.removeItem('currentSearch');

        // ========== localStorage数据管理 ==========
        // 从localStorage加载数据
        const loadFromStorage = () => {
            const savedLikes = localStorage.getItem('foodLikes');
            const savedCollects = localStorage.getItem('foodCollects');
            return {
                likes: savedLikes ? JSON.parse(savedLikes) : {},
                collects: savedCollects ? JSON.parse(savedCollects) : {}
            };
        };

        // 保存到localStorage
        const saveToStorage = (likes, collects) => {
            localStorage.setItem('foodLikes', JSON.stringify(likes));
            localStorage.setItem('foodCollects', JSON.stringify(collects));
        };

        // 初始化数据
        const { likes, collects } = loadFromStorage();

        /**
         * 创建美食卡片
         */
        const createCard = (food) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // 卡片HTML结构，包含骨架屏
            card.innerHTML = `
                <div class="card-image-wrapper">
                    <div class="card-image-skeleton">${food.emoji}</div>
                    <img 
                        src="${food.image}" 
                        alt="${food.name}" 
                        class="card-image"
                        onload="this.parentElement.querySelector('.card-image-skeleton').style.display='none'"
                        onerror="this.style.display='none'; this.parentElement.querySelector('.card-image-skeleton').style.display='flex'; this.parentElement.querySelector('.card-image-skeleton').classList.remove('card-image-skeleton');"
                    >
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <span class="food-emoji">${food.emoji}</span>
                        <h3 class="food-name">${food.name}</h3>
                    </div>
                    <p class="card-desc">${food.shortDesc}</p>
                    <div class="card-info">
                        <span class="location">${food.location}</span>
                        <span class="recommend">${food.recommender}</span>
                    </div>
                </div>
            `;
            
            // 点击卡片打开详情弹窗
            card.addEventListener('click', () => showModal(food));
            return card;
        };

        /**
         * 过滤美食数据
         */
        const filterFoods = () => {
            let filtered = [...foods];
            
            // 分类过滤
            if (currentCategory !== 'all') {
                filtered = filtered.filter(food => food.category === currentCategory);
            }
            
            // 搜索过滤
            if (currentSearch.trim()) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(food => 
                    food.name.toLowerCase().includes(searchLower) ||
                    food.shortDesc.toLowerCase().includes(searchLower) ||
                    food.recommender.toLowerCase().includes(searchLower) ||
                    food.location.toLowerCase().includes(searchLower) ||
                    food.desc.toLowerCase().includes(searchLower)
                );
            }
            
            return filtered;
        };

        /**
         * 渲染首页卡片
         */
        const renderHomePage = () => {
            // 立即显示加载状态
            loading.style.display = 'flex';
            foodGrid.style.display = 'none';
            
            // 确保状态正确
            console.log('当前分类:', currentCategory);
            console.log('当前搜索:', currentSearch);
            
            // 立即渲染，不使用延迟
            foodGrid.innerHTML = '';
            const filteredFoods = filterFoods();
            
            console.log('过滤结果数量:', filteredFoods.length);
            
            if (filteredFoods.length === 0) {
                // 无结果提示
                foodGrid.innerHTML = `
                    <div class="no-results">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">😔</div>
                        <p>没有找到符合条件的美食</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">试试其他搜索词或筛选条件吧</p>
                    </div>
                `;
            } else {
                // 渲染卡片
                filteredFoods.forEach((food, index) => {
                    const card = createCard(food);
                    // 错开动画延迟，形成瀑布式进入效果
                    card.style.animationDelay = `${(index % 8) * 0.08 + 0.05}s`;
                    foodGrid.appendChild(card);
                });
            }
            
            // 隐藏加载状态，显示内容
            loading.style.display = 'none';
            foodGrid.style.display = 'grid';
        };

        /**
         * 显示详情弹窗
         */
        const showModal = (food) => {
            currentFood = food;
            
            // 设置弹窗内容
            modalEmoji.textContent = food.emoji;
            modalTitle.textContent = food.name;
            modalShop.textContent = food.location.replace('📍 ', '');
            modalImage.src = food.image;
            modalImage.alt = food.name;
            modalDesc.textContent = food.desc;
            modalRecommendText.textContent = food.recommendText;
            modalRecommendName.textContent = '—— ' + food.recommendName;
            
            // 设置标签
            modalTags.innerHTML = '';
            food.tags.forEach(tag => {
                const tagElement = document.createElement('span');
                tagElement.className = 'modal-tag';
                tagElement.textContent = tag;
                modalTags.appendChild(tagElement);
            });
            
            // 设置点赞数（从localStorage读取）
            modalLikeCount.textContent = likes[food.id] || 0;
            
            // 设置收藏状态（从localStorage读取）
            if (collects[food.id]) {
                modalCollectBtn.classList.add('collected');
                modalCollectBtn.innerHTML = '<span>⭐</span><span>已收藏</span>';
            } else {
                modalCollectBtn.classList.remove('collected');
                modalCollectBtn.innerHTML = '<span>⭐</span><span>收藏</span>';
            }
            
            // 显示弹窗，禁止页面滚动
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        /**
         * 关闭弹窗
         */
        const closeModal = () => {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            currentFood = null;
        };

        /**
         * 点赞处理
         */
        const handleLike = () => {
            if (currentFood) {
                // 增加点赞数
                likes[currentFood.id] = (likes[currentFood.id] || 0) + 1;
                modalLikeCount.textContent = likes[currentFood.id];
                // 保存到localStorage
                saveToStorage(likes, collects);
            }
        };

        /**
         * 收藏处理
         */
        const handleCollect = () => {
            if (currentFood) {
                // 切换收藏状态
                collects[currentFood.id] = !collects[currentFood.id];
                
                // 更新UI
                if (collects[currentFood.id]) {
                    modalCollectBtn.classList.add('collected');
                    modalCollectBtn.innerHTML = '<span>⭐</span><span>已收藏</span>';
                } else {
                    modalCollectBtn.classList.remove('collected');
                    modalCollectBtn.innerHTML = '<span>⭐</span><span>收藏</span>';
                }
                
                // 保存到localStorage
                saveToStorage(likes, collects);
            }
        };

        // ========== 事件绑定 ==========
        
        // 搜索输入事件
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderHomePage();
        });

        // 分类筛选事件
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 移除所有按钮的active状态
                filterBtns.forEach(b => b.classList.remove('active'));
                // 激活当前按钮
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                // 重新渲染页面
                renderHomePage();
            });
        });

        // 弹窗关闭事件（点击关闭按钮）
        modalClose.addEventListener('click', closeModal);

        // 弹窗关闭事件（点击遮罩层）
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        // ESC键关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });

        // 点赞按钮事件
        modalLikeBtn.addEventListener('click', handleLike);

        // 收藏按钮事件
        modalCollectBtn.addEventListener('click', handleCollect);

        // 导航栏滚动收缩效果
        const header = document.querySelector('header');
        let lastScrollY = window.scrollY;

        const handleScroll = () => {
            const currentScrollY = window.scrollY;
            
            if (currentScrollY > 50 && currentScrollY > lastScrollY) {
                header.classList.add('scrolled');
            } else if (currentScrollY < 30) {
                header.classList.remove('scrolled');
            }
            
            lastScrollY = currentScrollY;
        };

        window.addEventListener('scroll', handleScroll, { passive: true });

        // ========== 页面初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            // 确保"全部"按钮处于激活状态
            const allBtn = document.querySelector('.filter-btn[data-category="all"]');
            if (allBtn) {
                filterBtns.forEach(b => b.classList.remove('active'));
                allBtn.classList.add('active');
            }
            // 初始化显示所有美食
            currentCategory = 'all';
            currentSearch = '';
            renderHomePage();
        });
    </script>
</body>
</html>

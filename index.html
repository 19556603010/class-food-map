<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级美食地图 - 同学们的私藏食堂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #FFFBF5 0%, #FFF8E7 30%, #FFF0E0 60%, #FFFAF0 100%);
            min-height: 100vh;
            padding-top: 280px;
            overflow-x: hidden;
        }

        /* 导航栏基础样式 */
        header {
            background: linear-gradient(135deg, #FF9F43 0%, #FF6B35 50%, #E65100 100%);
            color: white;
            padding: 1.5rem 1rem;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 20px rgba(255, 107, 53, 0.3);
        }

        /* 导航栏收缩状态 */
        header.scrolled {
            padding: 0.6rem 1rem;
            box-shadow: 0 4px 30px rgba(255, 107, 53, 0.4);
        }

        header.scrolled .header-icon {
            font-size: 1.5rem;
            margin-bottom: 0.2rem;
        }

        header.scrolled h1 {
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
        }

        header.scrolled .subtitle {
            display: none;
        }

        header.scrolled .search-box {
            max-width: 400px;
            padding: 0.5rem 1rem;
        }

        header.scrolled .filter-section {
            margin-top: 0.5rem;
        }

        .header-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 1rem;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .filter-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(255,255,255,0.98);
            color: #FF6B35;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* 卡片基础样式 */
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardFadeIn 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* 卡片进入动画 - 错开时间 */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }
        .card:nth-child(7) { animation-delay: 0.7s; }
        .card:nth-child(8) { animation-delay: 0.8s; }

        /* 卡片进入动画关键帧 */
        @keyframes cardFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            50% {
                opacity: 0.7;
                transform: translateY(-5px) scale(1.01);
            }
            70% {
                transform: translateY(3px) scale(0.99);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 卡片悬停效果 */
        .card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px rgba(255, 107, 53, 0.25), 0 0 0 1px rgba(255, 107, 53, 0.15), 0 0 60px rgba(255, 159, 67, 0.1);
            z-index: 10;
        }

        .card:hover .card-image {
            transform: scale(1.18);
        }

        .card:hover .food-name {
            color: #FF6B35;
        }

        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: linear-gradient(135deg, #FFE0B2 0%, #FFCC80 100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-content {
            padding: 1.2rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.6rem;
        }

        .food-emoji {
            font-size: 1.5rem;
        }

        .food-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #333;
        }

        .card-desc {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.6rem;
            border-top: 1px solid #eee;
            font-size: 0.75rem;
        }

        .location {
            color: #FF6B35;
        }

        .recommend {
            background: #FFF3E0;
            color: #E65100;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-weight: 500;
        }

        /* 页面过渡动画容器 */
        .page-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-container.fade-out {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
        }

        /* 详情页过渡动画 */
        #detail-page {
            display: none;
            padding-top: 180px;
            min-height: 100vh;
            background: linear-gradient(180deg, #FFFBF5 0%, #FFF8E7 50%, #FFFAF0 100%);
        }

        #detail-page.active {
            animation: pageFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* 页面进入动画 */
        @keyframes pageFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 详情页内容元素动画 */
        .detail-container {
            animation: contentSlideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes contentSlideUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 详情页图片加载动画 */
        .detail-image {
            animation: imageZoomIn 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes imageZoomIn {
            0% {
                opacity: 0;
                transform: scale(0.92);
                border-radius: 30px;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                border-radius: 16px;
            }
        }

        /* 返回按钮动画 */
        .back-btn {
            animation: btnSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.1s;
            opacity: 0;
            transform: translateX(-20px);
        }

        @keyframes btnSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 详情页标题动画 */
        .detail-header {
            animation: headerSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }

        @keyframes headerSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #FF6B35;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .back-btn:hover {
            background: #E65100;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .detail-emoji {
            font-size: 3rem;
        }

        .detail-title {
            font-size: 2rem;
            color: #333;
        }

        .detail-shop {
            color: #FF6B35;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .detail-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 1.5rem;
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .detail-tag {
            background: #FFF3E0;
            color: #E65100;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .detail-desc {
            color: #555;
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .recommend-section {
            background: linear-gradient(135deg, #FFF8E7 0%, #FFF0E0 50%, #FFFAF5 100%);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 107, 53, 0.1);
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.05);
        }

        .recommend-label {
            color: #FF6B35;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .recommend-text {
            color: #555;
            font-style: italic;
            line-height: 1.7;
        }

        .recommend-name {
            text-align: right;
            color: #888;
            font-size: 0.9rem;
            margin-top: 0.8rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .like-btn {
            background: linear-gradient(135deg, #FFF3E0 0%, #FFE0B2 100%);
            color: #E65100;
        }

        .like-btn:hover {
            background: linear-gradient(135deg, #FFE0B2 0%, #FFCC80 100%);
        }

        .collect-btn {
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
            color: #1976D2;
        }

        .collect-btn:hover {
            background: linear-gradient(135deg, #BBDEFB 0%, #90CAF9 100%);
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            margin-top: 3rem;
        }

        .github-btn {
            display: inline-block;
            background: #FF6B35;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .footer-text {
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* 首页过渡动画 */
        main#home-page {
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        @media (max-width: 768px) {
            body {
                padding-top: 300px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }

            .detail-image {
                height: 280px;
            }

            .detail-title {
                font-size: 1.5rem;
            }

            .actions {
                flex-wrap: wrap;
            }

            .action-btn {
                flex: 1;
                min-width: 140px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding-top: 320px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .card-content {
                padding: 1rem;
            }

            .detail-image {
                height: 220px;
            }
        }
    </style>
</head>

        <input type="text" class="search-box" id="search-input" placeholder="搜索美食、店铺或推荐人...">
        <div class="filter-section">
            <button class="filter-btn active" data-category="all">全部</button>

    <main id="home-page" class="container">

    <main id="detail-page">

    </footer>

                tags: ['🍯 蜂蜜芥末', '💰 人均25元', '⏰ 11:00-23:00', '📺 追剧必备'],
                category: '快餐',
                desc: '生活委员发掘的这家韩式炸鸡店，简直是我们周末的快乐源泉！炸鸡外皮酥脆到咬开有咔嚓声，内里的鸡肉却鲜嫩多汁。',
                recommendText: '这家炸鸡我能吃一辈子！外皮超级脆，肉又嫩又多汁。一定要点蜂蜜芥末味的，相信我，蘸酱吃一口就上头。',
                recommendName: '生活委员 赵小琳'
            },
            {
                id: 5,
                name: '川味麻辣烫',
                emoji: '🍲',
                image: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=600&h=400&fit=crop',
                location: '📍 食堂后门',
                recommender: '卫生委员推荐',

                tags: ['🌶️ 麻辣鲜香', '💰 人均18元', '⏰ 10:00-21:00', '❄️ 冬日暖身'],
                category: '小吃',
                desc: '食堂后门的这家麻辣烫是卫生委员的最爱！食材都是当天新鲜采购的，种类超级丰富。',
                recommendText: '作为一个四川人，这家的麻辣烫真的很对我的胃口！汤底够麻够辣，食材也很新鲜。',
                recommendName: '卫生委员 刘小红'
            },
            {
                id: 6,
                name: '东北烤冷面',
                emoji: '🌭',
                image: 'https://images.unsplash.com/photo-1552664730-d307ca884978?w=600&h=400&fit=crop',
                location: '📍 北门门口',
                recommender: '宣传委员推荐',
                shortDesc: '劲道的冷面皮包裹着鸡蛋和火腿肠',
                tags: ['🔥 校门口回忆', '💰 人均8元', '⏰ 5:00-22:00', '✨ 经典小吃'],
                category: '小吃',
                desc: '北门门口的烤冷面摊承载了我们太多的回忆！宣传委员每天放学都会来买一份。',
                recommendText: '这是我每天放学的必修课！冷面皮劲道有嚼劲，酱料是老板秘制的，甜辣适中。',
                recommendName: '宣传委员 孙小华'
            },
            {
                id: 7,
                name: '粤味双皮奶',
                emoji: '🧁',
                image: 'https://images.unsplash.com/photo-1571877227908-95a63e212606?w=600&h=400&fit=crop',
                location: '📍 步行街转角',
                recommender: '团支书推荐',
                shortDesc: '正宗广东风味，奶皮厚实香醇，口感细腻顺滑',
                tags: ['🥛 奶香浓郁', '💰 人均10元', '⏰ 11:00-21:00', '💕 甜蜜时光'],
                category: '甜品',
                desc: '步行街转角的双皮奶店是团支书的私藏！正宗的广东风味，奶皮厚实香醇，口感细腻顺滑得像丝绸一样。',
                recommendText: '这家双皮奶真的太治愈了！奶香味超级浓郁，口感顺滑得像在吃云朵。',
                recommendName: '团支书 周小美'
            }
        ];

        const homePage = document.getElementById('home-page');
        const detailPage = document.getElementById('detail-page');
        const foodGrid = document.getElementById('food-grid');
        const backBtn = document.getElementById('back-btn');
        const searchInput = document.getElementById('search-input');
        const filterBtns = document.querySelectorAll('.filter-btn');

        const likeBtn = document.getElementById('like-btn');
        const collectBtn = document.getElementById('collect-btn');
        const likeCount = document.getElementById('like-count');

        let currentFood = null;
        const likes = {};
        const collects = {};
        let currentCategory = 'all';
        let currentSearch = '';

        function createCard(food) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${food.image}" alt="${food.name}" class="card-image">
                <div class="card-content">
                    <div class="card-header">
                        <span class="food-emoji">${food.emoji}</span>
                        <h3 class="food-name">${food.name}</h3>
                    </div>
                    <p class="card-desc">${food.shortDesc}</p>
                    <div class="card-info">
                        <span class="location">${food.location}</span>
                        <span class="recommend">${food.recommender}</span>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => showDetail(food));
            return card;
        }

        function filterFoods() {
            let filtered = foods;
            if (currentCategory !== 'all') {
                filtered = filtered.filter(food => food.category === currentCategory);
            }
            if (currentSearch.trim()) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(food => 
                    food.name.toLowerCase().includes(searchLower) ||
                    food.shortDesc.toLowerCase().includes(searchLower) ||
                    food.recommender.toLowerCase().includes(searchLower) ||
                    food.location.toLowerCase().includes(searchLower)
                );
            }
            return filtered;
        }

        function renderHomePage() {
            foodGrid.innerHTML = '';
            const filteredFoods = filterFoods();
            
            if (filteredFoods.length === 0) {
                foodGrid.innerHTML = `
                    <div class="no-results">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">😔</div>
                        <p>没有找到符合条件的美食</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">试试其他搜索词或筛选条件吧</p>
                    </div>
                `;
                return;
            }
            
            filteredFoods.forEach(food => {
                const card = createCard(food);
                foodGrid.appendChild(card);
            });
        }

        function showDetail(food) {
            currentFood = food;
            
            document.getElementById('detail-emoji').textContent = food.emoji;
            document.getElementById('detail-title').textContent = food.name;
            document.getElementById('detail-shop').textContent = food.location.replace('📍 ', '');
            document.getElementById('detail-image').src = food.image;
            document.getElementById('detail-image').alt = food.name;
            document.getElementById('detail-desc').textContent = food.desc;
            document.getElementById('recommend-text').textContent = food.recommendText;
            document.getElementById('recommend-name').textContent = '—— ' + food.recommendName;

            const tagsContainer = document.getElementById('detail-tags');
            tagsContainer.innerHTML = '';
            food.tags.forEach(tag => {
                const tagElement = document.createElement('span');
                tagElement.className = 'detail-tag';
                tagElement.textContent = tag;
                tagsContainer.appendChild(tagElement);
            });

            likeCount.textContent = likes[food.id] || 0;

            // 重置详情页动画状态
            detailPage.classList.remove('active');
            const detailContainer = document.querySelector('.detail-container');
            detailContainer.style.opacity = '0';
            detailContainer.style.transform = 'translateY(50px)';

            // 先隐藏首页，再显示详情页
            homePage.style.opacity = '0';
            homePage.style.transform = 'translateY(20px) scale(0.98)';
            
            setTimeout(() => {
                homePage.style.display = 'none';
                detailPage.style.display = 'block';
                window.location.hash = `#detail-${food.id}`;
                
                // 触发详情页动画
                setTimeout(() => {
                    detailPage.classList.add('active');
                    detailContainer.style.opacity = '1';
                    detailContainer.style.transform = 'translateY(0)';
                }, 50);
            }, 300);
        }

        function goHome() {
            // 先隐藏详情页
            detailPage.style.opacity = '0';
            detailPage.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                detailPage.style.display = 'none';
                homePage.style.display = 'block';
                homePage.style.opacity = '0';
                homePage.style.transform = 'translateY(20px)';
                
                // 触发首页进入动画
                setTimeout(() => {
                    homePage.style.opacity = '1';
                    homePage.style.transform = 'translateY(0)';
                }, 50);
                
                window.location.hash = '#home';
            }, 300);
        }

        backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            goHome();
        });

        likeBtn.addEventListener('click', () => {
            if (currentFood) {
                likes[currentFood.id] = (likes[currentFood.id] || 0) + 1;
                likeCount.textContent = likes[currentFood.id];
            }
        });

        collectBtn.addEventListener('click', () => {
            if (currentFood) {
                collects[currentFood.id] = !collects[currentFood.id];
                collectBtn.style.background = collects[currentFood.id] ? '#BBDEFB' : '#E3F2FD';
            }
        });

        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderHomePage();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderHomePage();
            });
        });

        function handleHashChange() {
            const hash = window.location.hash;
            if (hash.startsWith('#detail-')) {
                const id = parseInt(hash.split('-')[1]);
                const food = foods.find(f => f.id === id);
                if (food) {
                    showDetail(food);
                    return;
                }
            }
            goHome();
        }

        window.addEventListener('hashchange', handleHashChange);
        renderHomePage();
        handleHashChange();

        /* 导航栏滚动收缩效果 */
        const header = document.querySelector('header');
        let lastScrollY = window.scrollY;

        function handleScroll() {
            const currentScrollY = window.scrollY;
            
            if (currentScrollY > 50 && currentScrollY > lastScrollY) {
                // 向下滚动且超过50px，收缩导航栏
                header.classList.add('scrolled');
            } else if (currentScrollY < 30) {
                // 向上滚动回到顶部，展开导航栏
                header.classList.remove('scrolled');
            }
            
            lastScrollY = currentScrollY;
        }

        window.addEventListener('scroll', handleScroll, { passive: true });
    </script>
</body>
</html>

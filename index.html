<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级美食地图</title>
    <style>
        body { font-family: sans-serif; background: #FFF8E7; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #FF6B35; text-align: center; }
    </style>
</head>
<body>
    <h1>📍 班级美食地图</h1>
    <div class="card"><strong>🍳 阿强铁板炒饭</strong><br>粒粒分明的米饭配上新鲜时蔬和嫩滑的鸡蛋</div>
    <div class="card"><strong>🍜 柳州螺蛳粉</strong><br>正宗柳州风味，酸笋的独特香气配上红油汤底</div>
    <div class="card"><strong>🥞 天津煎饼果子</strong><br>金黄酥脆的薄饼裹上新鲜鸡蛋</div>
    <div class="card"><strong>🥤 茶语时光奶茶</strong><br>现煮茶底搭配新鲜牛奶，珍珠Q弹有嚼劲</div>
    <div class="card"><strong>🍗 Obligi炸鸡小屋</strong><br>韩式炸鸡外酥里嫩，蜂蜜芥末酱是绝配</div>
    <div class="card"><strong>🍲 川味麻辣烫</strong><br>自选食材新鲜丰富，汤底麻辣鲜香</div>
    <div class="card"><strong>🌭 东北烤冷面</strong><br>劲道的冷面皮包裹着鸡蛋和火腿肠</div>
    <div class="card"><strong>🧁 粤味双皮奶</strong><br>正宗广东风味，奶皮厚实香醇</div>
</body>
</html>
